# graf configuration

[visual]
theme = "onedark"
background = "transparent"
node_color_mode = "folder"
edge_color_mode = "uniform"
label_mode = "selected"
label_max_length = 20
node_size = 2.0
node_size_mode = "fixed"
edge_thickness = 1
show_legend = true
show_grid = false
show_minimap = false
minimap_position = "top_right"
minimap_width = 24
minimap_height = 12
canvas_marker = "braille"
node_shape = "circle"
label_offset = 4.0
grid_divisions = 10

